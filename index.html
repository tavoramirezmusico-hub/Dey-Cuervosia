<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dey Cuervosía</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- ===== HERO ===== -->
    <section class="hero">
        <div class="hero-content">
            <!-- Texto principal con el verso -->
            <h1 class="hero-title">
                De aire está<br />
                <span>hecho mi cuerpo</span>
            </h1>
            <!-- Nombre de la marca/poesía -->
            <p class="hero-subtitle">Dey Cuervosía</p>
        </div>
        <!-- Imagen de fondo (hero) se coloca con CSS usando img/hero.webp -->
    </section>

    <!-- ===== CONTENIDO PRINCIPAL (ejemplo) ===== -->
    <main>
        <section class="intro">
            <h2>Bienvenida</h2>
            <p>
                Este es el espacio de Dey Cuervosía. Un lugar donde las palabras
                vuelan y el aire se vuelve verso.
            </p>
        </section>
        <!-- Aquí puedes agregar más secciones (poemas, biografía, etc.) -->
    </main>

    <!-- ===== PIE DE PÁGINA ===== -->
    <footer>
        <p>&copy; 2026 Dey Cuervosía · Hecho con aire</p>
    </footer>

    <!-- Enlace al archivo JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
